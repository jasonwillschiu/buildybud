version: "3"

tasks:
  default:
    cmds:
      - task --list

  fmt:
    desc: Format Go files
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  lint:
    desc: Run fmt + vet
    deps: [fmt, vet]

  build:
    desc: Build buildybud binary
    cmds:
      - mkdir -p bin
      - go build -o bin/buildybud .

  doctor:
    desc: Run buildybud doctor
    deps: [build]
    cmds:
      - ./bin/buildybud doctor
